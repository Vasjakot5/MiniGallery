version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: minigallery-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: minigallery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minigallery-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minigallery-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: minigallery
      DB_SSL_MODE: disable
      SERVER_PORT: 8080
      JWT_SECRET: gallery-secret-key-change-in-production
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
      - ./web:/app/web
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - minigallery-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  minigallery-network:
    driver: bridge